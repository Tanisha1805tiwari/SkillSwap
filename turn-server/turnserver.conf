# SkillSwap Coturn TURN Server Configuration
# Production-ready config for WebRTC NAT traversal

# Listener port for TURN/STUN
listening-port=3478

# TLS port
tls-listening-port=5349

# External/relay IP (set via environment or replace with your server IP)
# external-ip=YOUR_SERVER_PUBLIC_IP

# TURN server realm
realm=skillswap.io

# Server name
server-name=skillswap-turn

# Authentication
# Use static credentials (set via TURN_USERNAME and TURN_CREDENTIAL env vars)
# Or use HMAC time-limited credentials for production
lt-cred-mech

# User credentials (format: username=password)
# Override with actual credentials in production
user=skillswap:skillswap_turn_secret_change_in_production

# Relay ports range for WebRTC
min-port=49152
max-port=65535

# Logging
log-file=/var/log/turnserver.log
verbose

# Security
fingerprint
no-loopback-peers
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Performance
proc-user=turnserver
proc-group=turnserver

# TLS (uncomment and provide certs for production)
# cert=/etc/ssl/certs/turn-cert.pem
# pkey=/etc/ssl/private/turn-key.pem
